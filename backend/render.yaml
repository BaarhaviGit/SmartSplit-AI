services:
  - type: web
    name: smartsplit-backend
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DB_PATH
        value: /opt/render/project/src/data/smartsplit.db
      - key: PHONEPE_MERCHANT_ID
        value: PGTESTPAYUAT86
      - key: PHONEPE_SALT_KEY
        value: 96434309-7796-489d-8924-ab56988a6076
      - key: PHONEPE_SALT_INDEX
        value: 1
      - key: FRONTEND_URL
        sync: false
    disk:
      name: smartsplit-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
